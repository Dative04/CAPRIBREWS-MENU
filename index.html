<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capribrews — Order Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --espresso: #2d1a10; /* Lighter than original #1a0f0a */
    --dark-roast: #3e2717; /* Lighter than original #2d1a10 */
    --medium-roast: #5d3d28; /* Lighter than original #4a2c1a */
    --caramel: #a67b5b; /* Lighter than original #8b5e3c */
    --latte: #d4a373; /* Lighter than original #c4956a */
    --cream: #fefae0; /* Lighter than original #f5ede0 */
    --milk-foam: #fffdf5;
    --warm-white: #fffcf9;
    --accent: #bc6c25;
    --accent-light: #dda15e;
    --green: #606c38;
    --red: #bc4749;
    --shadow: 0 4px 24px rgba(45,26,16,0.2);
    --shadow-lg: 0 8px 48px rgba(45,26,16,0.3);
    --radius: 16px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--espresso);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(139,94,60,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(74,44,26,0.2) 0%, transparent 60%),
      url('https://raw.githubusercontent.com/Dative04/CAPRIBREWS-MENU/main/logo.png') center/60% no-repeat,
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.8;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: 'CAPRIBREWS';
    position: fixed;
    top: 80%;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 6rem;
    font-weight: 700;
    color: var(--latte);
    opacity: 0.1;
    letter-spacing: 0.5rem;
    pointer-events: none;
    z-index: 0;
    white-space: nowrap;
  }

  /* Responsive Backdrop for Mobile */
  @media (max-width: 600px) {
    body::before {
      background-size: 100% auto, 60px 60px; /* Make logo smaller on mobile */
      background-position: center 30%, center;
    }
    body::after {
      font-size: 3rem;
      top: 90%;
    }
  }

  /* ── Header ── */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(26,15,10,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(196,149,106,0.2);
    padding: 0 20px;
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-img {
     width: 36px;
     height: 36px;
     object-fit: contain;
     flex-shrink: 0;
     background: var(--accent); /* Fallback */
     border-radius: 50%;
   }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--cream);
    letter-spacing: 0.5px;
  }

  .logo-text span {
    font-style: italic;
    color: var(--accent-light);
  }

  .header-cart-btn {
    position: relative;
    z-index: 110;
    background: var(--medium-roast);
    border: 1px solid rgba(196,149,106,0.3);
    color: var(--cream);
    border-radius: 24px;
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    user-select: none;
    pointer-events: auto;
  }

  .header-cart-btn:hover { background: var(--caramel); }

  .cart-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0);
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .cart-badge.visible { opacity: 1; transform: scale(1); }

  /* ── Custom Scrollbar ── */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--medium-roast);
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--caramel);
  }
  /* For Firefox */
  * {
    scrollbar-width: thin;
    scrollbar-color: var(--medium-roast) transparent;
  }

  /* Hide default scrollbars in PC mode for specific elements */
  @media (min-width: 851px) {
    .sidebar, .drawer-items, .modal-box {
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE/Edge */
    }
    .sidebar::-webkit-scrollbar, 
    .drawer-items::-webkit-scrollbar, 
    .modal-box::-webkit-scrollbar {
      display: none; /* Chrome/Safari/Webkit */
    }
  }

  /* ── Sidebar & Layout ── */
  .layout-wrapper {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }

  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,15,10,0.4);
    backdrop-filter: none; /* Removed blur to prevent whole screen blurring */
    z-index: 240;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
    pointer-events: none; /* Default to no interaction */
  }

  .sidebar-overlay.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto; /* Allow clicking to close when open */
  }

  .sidebar {
    width: 240px;
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    background: rgba(26,15,10,0.8);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(196,149,106,0.15);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar::-webkit-scrollbar { display: none; } /* Hide sidebar scrollbar */
  .sidebar { -ms-overflow-style: none; scrollbar-width: none; }

  .sidebar-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--latte);
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    opacity: 0.7;
  }

  .sidebar-tab {
    background: transparent;
    border: none;
    color: rgba(245,237,224,0.6);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-tab:hover {
    background: rgba(196,149,106,0.1);
    color: var(--cream);
  }

  .sidebar-tab.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 12px rgba(188, 108, 37, 0.2);
  }

  .main-content {
    flex: 1;
    padding: 28px 40px 140px;
    min-width: 0;
  }

  /* ── Search Bar ── */
  .search-section {
    margin-bottom: 24px;
    width: 100%;
    max-width: 450px;
    position: relative;
  }

  .search-container {
    position: relative;
    width: 100%;
    display: flex;
    align-items: center;
  }

  .search-input {
    width: 100%;
    background: var(--dark-roast);
    border: 2px solid rgba(196,149,106,0.15);
    border-radius: 14px;
    padding: 12px 16px 12px 42px;
    color: var(--cream);
    font-size: 15px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: var(--shadow);
  }

  .search-input:focus {
    border-color: var(--accent);
    background: var(--medium-roast);
    box-shadow: 0 0 0 4px rgba(188, 108, 37, 0.1), var(--shadow-lg);
    transform: translateY(-1px);
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.6;
    color: var(--latte);
    transition: all 0.3s;
  }

  .search-input:focus + .search-icon {
    color: var(--accent);
    opacity: 1;
  }

  /* Mobile Adjustments for Sidebar */
  @media (max-width: 850px) {
    .sidebar {
      position: fixed;
      left: -240px;
      z-index: 250;
      transition: left 0.3s ease;
      background: var(--dark-roast);
    }
    .sidebar.open {
      left: 0;
    }
    .main-content {
      padding: 20px;
    }
    .mobile-menu-toggle {
      display: flex !important;
    }
    .layout-wrapper {
        display: block;
    }
  }

  .mobile-menu-toggle {
    display: none;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 16px;
  }

  /* Hide old category bar and search section */
  .category-bar, .search-section { display: none !important; }

  .section-label {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--latte);
    margin-bottom: 16px;
    opacity: 0.8;
  }

  /* ── Menu grid ── */
  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .menu-card {
    background: var(--dark-roast);
    border: 1px solid rgba(196,149,106,0.15);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    animation: fadeUp 0.4s ease both;
    display: flex;
    flex-direction: column;
  }

  .item-image-container {
    width: 100%;
    height: 180px;
    overflow: hidden;
    background-color: var(--medium-roast);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid rgba(196,149,106,0.1);
  }

  .item-image-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s ease;
  }

  .item-image-container .placeholder-logo {
    width: 60px;
    height: 60px;
    object-fit: contain;
    opacity: 0.3;
  }

  .menu-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: rgba(196,149,106,0.3);
  }

  .menu-card:hover .item-image-container img {
    transform: scale(1.05);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }

  .card-body {
    padding: 14px 16px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-cat {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--latte);
    margin-bottom: 4px;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--cream);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 13px;
    color: rgba(245,237,224,0.55);
    line-height: 1.5;
    margin-bottom: 14px;
    flex: 1;
  }

  /* ── Sugar Selector ── */
  .sugar-selector {
    margin-bottom: 14px;
    padding-top: 10px;
    border-top: 1px solid rgba(196,149,106,0.1);
  }

  .sugar-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--latte);
    text-transform: uppercase;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .sugar-options {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .sugar-pill {
    background: var(--medium-roast);
    border: 1px solid rgba(196,149,106,0.2);
    color: var(--cream);
    border-radius: 15px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .sugar-pill:hover {
    border-color: var(--accent);
  }

  .sugar-pill.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Size buttons */
  .size-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .size-btn {
    position: relative;
    z-index: 2;
    background: var(--medium-roast);
    border: 1px solid rgba(196,149,106,0.25);
    color: var(--cream);
    border-radius: 8px;
    padding: 7px 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
    pointer-events: auto;
  }

  .size-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.04);
  }

  .size-btn.added {
    background: var(--green);
    border-color: var(--green);
  }

  .size-price {
    display: block;
    font-size: 11px;
    opacity: 0.7;
    margin-top: 2px;
  }

  /* ── Sticky bottom bar ── */
  .sticky-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
    padding: 12px 20px 20px;
    background: linear-gradient(to top, rgba(26,15,10,1) 60%, transparent);
    pointer-events: none;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .sticky-bar.visible { transform: translateY(0); }

  .sticky-bar-inner {
    max-width: 900px;
    margin: 0 auto;
    background: var(--accent);
    border-radius: 16px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 -4px 32px rgba(212,130,42,0.4), var(--shadow-lg);
    cursor: pointer;
    transition: background 0.2s;
    pointer-events: auto;
    user-select: none;
  }

  .sticky-bar-inner:hover { background: var(--accent-light); }

  .sticky-left { display: flex; align-items: center; gap: 12px; }

  .sticky-count {
    background: rgba(255,255,255,0.25);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
  }

  .sticky-label { font-weight: 600; font-size: 15px; color: white; }

  .sticky-total {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: white;
    font-weight: 700;
  }

  /* ── Cart drawer ── */
  .drawer-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(26,15,10,0.7);
    backdrop-filter: blur(4px);
    z-index: 300;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: all 0.3s;
  }

  .drawer-overlay.open { 
    opacity: 1; 
    visibility: visible; 
    pointer-events: auto; 
  }

  .cart-drawer {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: min(420px, 100vw);
    background: var(--dark-roast);
    z-index: 1000;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    flex-direction: column;
    box-shadow: -8px 0 48px rgba(26,15,10,0.5);
    height: 100vh;
    height: 100dvh;
    pointer-events: auto;
  }

  .cart-drawer.open { transform: translateX(0); }

  .drawer-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid rgba(196,149,106,0.2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--dark-roast);
    position: relative;
    z-index: 10;
  }

  .drawer-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: var(--cream);
  }

  .drawer-close {
    background: var(--medium-roast);
    border: none;
    color: var(--cream);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 11;
  }

  .drawer-close:hover { background: var(--caramel); }

  .drawer-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    scrollbar-width: thin;
    scrollbar-color: var(--medium-roast) transparent;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
    background: var(--dark-roast);
    position: relative;
    z-index: 1;
  }

  .cart-item-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid rgba(196,149,106,0.1);
    animation: slideIn 0.2s ease;
    position: relative;
    z-index: 2;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .cart-item-emoji {
    width: 40px;
    height: 40px;
    background: var(--medium-roast);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .cart-item-info { flex: 1; min-width: 0; }

  .cart-item-name {
    font-weight: 500;
    font-size: 14px;
    color: var(--cream);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cart-item-size { font-size: 12px; color: var(--latte); margin-top: 2px; }

  .cart-item-price {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    color: var(--accent-light);
    flex-shrink: 0;
    margin-right: 10px;
  }

  /* Quantity controls */
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--medium-roast);
    padding: 4px;
    border-radius: 8px;
    border: 1px solid rgba(196,149,106,0.2);
    position: relative;
    z-index: 3;
  }

  .qty-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: none;
    background: var(--dark-roast);
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    z-index: 10;
    user-select: none;
    pointer-events: auto;
  }

  .qty-btn:hover { background: var(--caramel); }
  .qty-btn:active { transform: scale(0.9); }

  .qty-num {
    font-size: 14px;
    font-weight: 600;
    min-width: 20px;
    text-align: center;
    color: var(--cream);
  }

  .cart-remove {
    background: none;
    border: none;
    color: rgba(245,237,224,0.3);
    cursor: pointer;
    font-size: 24px;
    padding: 10px;
    transition: all 0.2s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    z-index: 10;
    user-select: none;
    pointer-events: auto;
  }

  .cart-remove:hover { color: #ff6b6b; transform: scale(1.1); }

  .empty-cart {
    text-align: center;
    padding: 60px 20px;
    color: rgba(245,237,224,0.3);
  }

  .empty-cart-icon { font-size: 48px; margin-bottom: 12px; }

  /* Ensure footer doesn't overlap on small screens */
  .drawer-footer {
    padding: 16px 24px 24px;
    border-top: 1px solid rgba(196,149,106,0.2);
    flex-shrink: 0;
    background: var(--dark-roast);
    position: relative;
    z-index: 20;
  }

  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }

  .total-label {
    font-size: 13px;
    color: var(--latte);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .total-amount {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--cream);
  }

  .order-type-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  await fetchMenu();
  buildCategoryTabs();

async function fetchMenu() {
  try {
    const { data, error } = await window.supabaseClient
      .from('menu')
      .select('*')
      .order('sort_order', { ascending: true });

    if (error) throw error;
    
    if (data && data.length > 0) {
      menuItems = data;
    } else {
      // Fallback to initial data if DB is empty
      menuItems = initialMenuData;
    }
  } catch (err) {
    console.error('Fetch menu error:', err);
    menuItems = initialMenuData;
  }
}

function buildCategoryTabs() {
  const cats = ['All', ...new Set(menuItems.map(i => i.category))];
  const container = document.getElementById('sidebar-nav');
  if (!container) return;
  
  container.innerHTML = cats.map(cat => {
    const emoji = cat === 'All' ? '🍽️' : (CATEGORY_EMOJIS[cat.toLowerCase()] || '•');
    const activeClass = cat === currentCategory ? 'active' : '';
    return `<button class="sidebar-tab ${activeClass}" onclick="filterCategory('${cat}')">
      <span>${emoji}</span> ${cat}
    </button>`;
  }).join('');
}

window.filterCategory = function(cat) {
  currentCategory = cat;
  
  // Update active state in sidebar
  document.querySelectorAll('.sidebar-tab').forEach(tab => {
    tab.classList.toggle('active', tab.textContent.includes(cat));
  });

  const label = document.getElementById('section-label');
  if (label) label.textContent = cat === 'All' ? 'All Items' : cat;
  
  // Close sidebar on mobile after selection
  if (window.innerWidth <= 850) {
    const sidebar = document.getElementById('sidebar');
    if (sidebar) sidebar.classList.remove('open');
  }
  
  renderMenu();
}

    // Prevent scrolling on body when sidebar is open on mobile
    if (window.innerWidth <= 850) {
      document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
    }
  }

window.handleSearch = function() {
  searchTerm = document.getElementById('menu-search').value.toLowerCase();
  renderMenu();
}

function renderMenu() {
  const grid = document.getElementById('menu-grid');
  const cat = currentCategory;
  
  const filteredItems = menuItems.filter(item => {
    const matchesCategory = cat === 'All' || item.category === cat;
    const matchesSearch = item.name.toLowerCase().includes(searchTerm) || 
                          (item.description && item.description.toLowerCase().includes(searchTerm));
    return item.available && matchesCategory && matchesSearch;
  });

  if (!filteredItems.length) {
    grid.innerHTML = '<div class="no-items"><div style="font-size:36px;margin-bottom:12px">☕</div><div>Nothing here yet. Try a different search!</div></div>';
    return;
  }

  grid.innerHTML = filteredItems.map((item, idx) => {
    const emoji = ITEM_EMOJIS[item.category] || '☕';
    
    // Determine if item is a beverage for sugar selector
    const beverageCategories = ['Coffee Selection', 'Frappe', 'Signature Twists', 'Soda Blends', 'Signature Fruit Infusions', 'Milkshakes', 'Premium Milkshakes'];
    const isBeverage = beverageCategories.includes(item.category);

    const sugarHTML = isBeverage ? `
      <div class="sugar-selector" id="sugar-selector-${item.id}">
        <div class="sugar-label">Sugar Level</div>
        <div class="sugar-options">
          <div class="sugar-pill" onclick="setSugarLevel(${item.id}, '0%')">0%</div>
          <div class="sugar-pill" onclick="setSugarLevel(${item.id}, '25%')">25%</div>
          <div class="sugar-pill" onclick="setSugarLevel(${item.id}, '50%')">50%</div>
          <div class="sugar-pill" onclick="setSugarLevel(${item.id}, '75%')">75%</div>
          <div class="sugar-pill active" onclick="setSugarLevel(${item.id}, '100%')">100%</div>
        </div>
        <input type="hidden" id="sugar-val-${item.id}" value="100%">
      </div>
    ` : '';

    const pricingHTML = item.prices
      ? Object.entries(item.prices).map(([size, price]) =>
          `<button class="size-btn" onclick="addToCart(event,${JSON.stringify(item).replace(/'/g,"&#39;").replace(/"/g,"&quot;")},'${size}',${price})">
            ${size}<span class="size-price">₱${price}</span>
          </button>`
        ).join('')
      : `<button class="size-btn" onclick="addToCart(event,${JSON.stringify(item).replace(/'/g,"&#39;").replace(/"/g,"&quot;")},'Standard',${item.price})">
          Add to Cart<span class="size-price">₱${item.price}</span>
        </button>`;

    const imgHtml = item.image_url 
      ? `<img src="${item.image_url}" class="card-img" alt="${item.name}" loading="lazy">` 
      : `<img src="https://raw.githubusercontent.com/Dative04/CAPRIBREWS-MENU/main/logo.png" class="placeholder-logo" alt="Capribrews">`;

    return `
      <div class="menu-card" style="animation-delay:${idx * 0.04}s">
        <div class="item-image-container">
          ${imgHtml}
        </div>
        <div class="card-body">
          <div class="card-cat">${item.category}</div>
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.description || ''}</div>
          ${sugarHTML}
          <div class="size-btns">${pricingHTML}</div>
        </div>
      </div>`;
  }).join('');
}

window.setSugarLevel = function(itemId, level) {
  const container = document.getElementById(`sugar-selector-${itemId}`);
  if (!container) return;
  
  // Update UI
  container.querySelectorAll('.sugar-pill').forEach(p => {
    p.classList.toggle('active', p.textContent === level);
  });
  
  // Update hidden input
  document.getElementById(`sugar-val-${itemId}`).value = level;
}

// ── Cart ──────────────────────────────────────────────────────────────────────
window.addToCart = function(event, item, size, price) {
  const sugarInput = document.getElementById(`sugar-val-${item.id}`);
  const sugarLevel = sugarInput ? sugarInput.value : null;

  const existing = cart.find(i => i.name === item.name && i.selectedSize === size && i.sugarLevel === sugarLevel);
  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ 
      ...item, 
      selectedSize: size, 
      selectedPrice: price, 
      sugarLevel: sugarLevel,
      quantity: 1,
      id: Math.floor(Date.now() + Math.random() * 1000) 
    });
  }
  updateCartUI();

  const btn = event.currentTarget;
  const orig = btn.innerHTML;
  btn.classList.add('added');
  btn.innerHTML = `✓ Added<span class="size-price">₱${price}</span>`;
  setTimeout(() => { btn.classList.remove('added'); btn.innerHTML = orig; }, 1400);
}

window.updateQuantity = function(uid, delta) {
  const item = cart.find(i => i.id === uid);
  if (item) {
    item.quantity += delta;
    if (item.quantity <= 0) {
      cart = cart.filter(i => i.id !== uid);
    }
    updateCartUI();
  }
}

window.removeFromCart = function(uid) {
  cart = cart.filter(i => i.id !== uid);
  updateCartUI();
}

function updateCartUI() {
  const count = cart.reduce((s, i) => s + i.quantity, 0);
  const total = cart.reduce((s, i) => s + (i.selectedPrice * i.quantity), 0);

  // Header badge
  const badge = document.getElementById('header-badge');
  badge.textContent = count;
  badge.classList.toggle('visible', count > 0);

  // Sticky bar
  const bar = document.getElementById('sticky-bar');
  bar.classList.toggle('visible', count > 0);
  document.getElementById('sticky-count').textContent = count;
  document.getElementById('sticky-total').textContent = `₱${total.toFixed(0)}`;

  // Drawer total
  document.getElementById('drawer-total').textContent = `₱${total.toFixed(0)}`;

  // Drawer items
  const container = document.getElementById('drawer-items');
  if (!count) {
    container.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon">🛒</div><div>Your cart is empty</div></div>`;
    return;
  }

  container.innerHTML = cart.map(item => {
    const emoji = ITEM_EMOJIS[item.category] || '☕';
    return `
      <div class="cart-item-row">
        <div class="cart-item-emoji">${emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-size">${item.selectedSize}${item.sugarLevel ? ` · Sugar: ${item.sugarLevel}` : ''}</div>
        </div>
        <div class="cart-item-price">₱${(item.selectedPrice * item.quantity).toFixed(0)}</div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
          <span class="qty-num">${item.quantity}</span>
          <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
        </div>
        <button class="cart-remove" onclick="removeFromCart(${item.id})" style="margin-left:8px">×</button>
      </div>`;
  }).join('');
}

// ── Order type ────────────────────────────────────────────────────────────────
window.setOrderType = function(type) {
  orderType = type;
  document.getElementById('btn-dinein').classList.toggle('active', type === 'dine-in');
  document.getElementById('btn-delivery').classList.toggle('active', type === 'delivery');
  document.getElementById('delivery-fields').classList.toggle('visible', type === 'delivery');
}

// ── Drawer ────────────────────────────────────────────────────────────────────
window.openCart = function() {
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

window.closeCart = function() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ── Checkout ──────────────────────────────────────────────────────────────────
window.handleCheckout = function() {
  if (!cart.length) {
    alert('Your cart is empty!');
    return;
  }

  const nameInput = document.getElementById('customer-name');
  const name = nameInput.value.trim();
  const nameError = document.getElementById('name-error');

  if (!name) {
    nameError.classList.add('visible');
    nameInput.focus();
    return;
  }
  nameError.classList.remove('visible');

  const isDelivery = orderType === 'delivery';
  let addr = null;
  let phone = null;

  if (isDelivery) {
    const addrInput = document.getElementById('delivery-address');
    const phoneInput = document.getElementById('contact-number');
    addr = addrInput.value.trim();
    phone = phoneInput.value.trim();
    
    if (!addr) {
      alert('Please enter your delivery address.');
      addrInput.focus();
      return;
    }
    if (!phone) {
      alert('Please enter your contact number.');
      phoneInput.focus();
      return;
    }
  }
  
  showConfirmation(name, addr, phone);
}

window.showConfirmation = function(name, address, phone) {
  const isDelivery = orderType === 'delivery';
  const total = cart.reduce((s, i) => s + (i.selectedPrice * i.quantity), 0);
  const itemsArr = cart.map(item => ({
    name: item.name,
    size: item.selectedSize,
    sugar: item.sugarLevel,
    price: item.selectedPrice,
    qty: item.quantity
  }));

  let summaryHTML = `
    <div class="receipt-header">
      <div class="receipt-shop-name">Order Summary</div>
    </div>
    <div class="receipt-row muted"><span>Customer</span><span>${name}</span></div>
    <div class="receipt-row muted"><span>Type</span><span>${isDelivery ? '🛵 Delivery' : '🍽️ Dine-In'}</span></div>`;

  if (isDelivery) {
    summaryHTML += `<div class="receipt-row muted"><span>Address</span><span style="text-align:right;max-width:180px">${address}</span></div>`;
    summaryHTML += `<div class="receipt-row muted"><span>Contact</span><span>${phone}</span></div>`;
  }

  summaryHTML += `<hr class="receipt-divider">`;
  itemsArr.forEach(item => {
    summaryHTML += `
      <div class="receipt-row">
        <span>${item.qty}× ${item.name} (${item.size})${item.sugar ? `<br><small style="opacity:0.7">Sugar Level: ${item.sugar}</small>` : ''}</span>
        <span>₱${(item.price * item.qty).toFixed(0)}</span>
      </div>`;
  });
  summaryHTML += `
    <hr class="receipt-divider">
    <div class="receipt-total-row"><span>TOTAL</span><span>₱${total.toFixed(0)}</span></div>`;

  document.getElementById('confirmation-details').innerHTML = summaryHTML;
  
  // Set the confirm button action
  const confirmBtn = document.getElementById('confirm-final-btn');
  confirmBtn.onclick = () => finalizeOrder(name, address, phone);

  // Close cart drawer on mobile so confirmation modal is visible
  closeCart();

  document.getElementById('confirmation-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

window.closeConfirmation = function() {
  document.getElementById('confirmation-modal').classList.remove('open');
  document.body.style.overflow = '';
}

async function finalizeOrder(name, address, phone) {
  const isDelivery = orderType === 'delivery';
  const total = cart.reduce((s, i) => s + (i.selectedPrice * i.quantity), 0);
  const finalConfirmBtn = document.getElementById('confirm-final-btn');
  const originalText = finalConfirmBtn.textContent;

  // Group items
  const itemsArr = cart.map(item => ({
    name: item.name,
    size: item.selectedSize,
    sugarLevel: item.sugarLevel,
    price: item.selectedPrice,
    qty: item.quantity
  }));

  // Loading state on the modal button
  finalConfirmBtn.disabled = true;
  finalConfirmBtn.textContent = '⌛ Placing Order...';

  try {
    // 1. Save to Supabase
    if (window.supabaseClient) {
      const { error } = await window.supabaseClient
        .from('orders')
        .insert([{
          customer_name: name,
          items: itemsArr,
          total_price: total,
          order_type: orderType,
          delivery_address: address,
          // phone_number: phone, // Uncomment this after adding 'phone_number' column to 'orders' table in Supabase
          status: 'pending'
        }]);
      
      if (error) throw error;
    }

    // Success! Close confirmation modal
    closeConfirmation();

    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
    const dateStr = now.toLocaleDateString('en-PH', { month: 'short', day: 'numeric', year: 'numeric' });

    // Build receipt HTML
    let receiptHTML = `
      <div class="receipt-header">
        <div class="receipt-shop-name">☕ Capribrews</div>
        <div class="receipt-meta">${dateStr} · ${timeStr}</div>
      </div>
      <div class="receipt-row muted"><span>Customer</span><span>${name}</span></div>
      <div class="receipt-row muted"><span>Type</span><span>${isDelivery ? '🛵 Delivery' : '🍽️ Dine-In'}</span></div>`;

    if (isDelivery) {
      receiptHTML += `<div class="receipt-row muted"><span>Address</span><span style="text-align:right;max-width:180px">${address}</span></div>`;
      receiptHTML += `<div class="receipt-row muted"><span>Contact</span><span>${phone}</span></div>`;
    }

    receiptHTML += `<hr class="receipt-divider">`;
    itemsArr.forEach(item => {
      receiptHTML += `<div class="receipt-row"><span>${item.qty}× ${item.name} (${item.size})</span><span>₱${(item.price * item.qty).toFixed(0)}</span></div>`;
    });
    receiptHTML += `
      <hr class="receipt-divider">
      <div class="receipt-total-row"><span>TOTAL</span><span>₱${total.toFixed(0)}</span></div>`;

    document.getElementById('receipt-paper').innerHTML = receiptHTML;

    // Modal content
    const modalIcon = document.getElementById('modal-icon');
    const modalTitle = document.getElementById('modal-title');
    const modalSubtitle = document.getElementById('modal-subtitle');
    const modalActions = document.getElementById('modal-actions');

    if (isDelivery) {
      modalIcon.textContent = '🛵';
      modalTitle.textContent = 'Ready to Send!';
      modalSubtitle.textContent = 'Your order is saved. Click below to notify us via Messenger.';

      const receiptText = buildReceiptText(name, address, phone, itemsArr, total);

      modalActions.innerHTML = `
        <button class="modal-btn modal-btn-primary" onclick="copyAndOpenMessenger('${encodeURIComponent(receiptText)}')">
          💬 Copy & Open Messenger
        </button>
        <button class="modal-btn modal-btn-ghost" onclick="closeModal()">Done</button>`;
    } else {
      modalIcon.innerHTML = `<span class="success-anim">🎉</span>`;
      modalTitle.textContent = 'Order Confirmed!';
      modalSubtitle.textContent = 'Your order is saved. Please proceed to the counter for payment.';

      modalActions.innerHTML = `
        <button class="modal-btn modal-btn-primary" onclick="closeModal()">
          Great, Thanks!
        </button>`;
    }

    // Clear cart & close drawer
    cart = [];
    updateCartUI();
    closeCart();

    // Clear inputs
    document.getElementById('customer-name').value = '';
    const addrInput = document.getElementById('delivery-address');
    const phoneInput = document.getElementById('contact-number');
    if (addrInput) addrInput.value = '';
    if (phoneInput) phoneInput.value = '';

    // Show modal
    document.getElementById('receipt-modal').classList.add('open');
    document.body.style.overflow = 'hidden';

  } catch (err) {
    console.error('Order error:', err);
    alert('Failed to place order: ' + (err.message || 'Unknown error'));
  } finally {
    finalConfirmBtn.disabled = false;
    finalConfirmBtn.textContent = originalText;
  }
}

function buildReceiptText(name, address, phone, items, total) {
  let text = `☕ CAPRIBREWS ORDER\n`;
  text += `━━━━━━━━━━━━━━━━━━\n`;
  text += `👤 Name: ${name}\n`;
  text += `🛵 Type: Delivery\n`;
  text += `📍 Address: ${address}\n`;
  text += `📞 Contact: ${phone}\n`;
  text += `━━━━━━━━━━━━━━━━━━\n`;
  items.forEach(i => { 
    text += `• ${i.qty}x ${i.name} (${i.size})${i.sugarLevel ? ` [Sugar: ${i.sugarLevel}]` : ''} — ₱${(i.price * i.qty).toFixed(0)}\n`; 
  });
  text += `━━━━━━━━━━━━━━━━━━\n`;
  text += `💰 TOTAL: ₱${total.toFixed(0)}\n`;
  text += `Status: Pending Payment via Messenger\n`;
  text += `━━━━━━━━━━━━━━━━━━\n`;
  text += `Thank you for choosing Capribrews! ☕`;
  return text;
}

window.copyAndOpenMessenger = async function(encodedText) {
  const text = decodeURIComponent(encodedText);
  try {
    await navigator.clipboard.writeText(text);
    alert('Order details copied! Now pasting into Messenger...');
  } catch (err) {
    console.error('Clipboard error:', err);
  }
  
  const messengerUrl = `https://m.me/61580219733955?text=${encodeURIComponent(text)}`;
  window.open(messengerUrl, '_blank');
}

window.closeModal = function() {
  document.getElementById('receipt-modal').classList.remove('open');
  document.body.style.overflow = '';
  // Reset name input
  document.getElementById('customer-name').value = '';
  document.getElementById('delivery-address').value = '';
  document.getElementById('contact-number').value = '';
}

// Close modal on backdrop click
document.getElementById('receipt-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── Start ─────────────────────────────────────────────────────────────────────
init();
});
</script>
