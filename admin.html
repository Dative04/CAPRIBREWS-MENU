<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capibrews Admin</title>
    <link rel="stylesheet" href="admin.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <img src="https://i.imgur.com/F022t03.png" alt="Capibrews Logo" class="login-logo">
            <h1>Admin Login</h1>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <div id="admin-screen" class="hidden">
        <header class="admin-header">
            <img src="https://i.imgur.com/F022t03.png" alt="Capibrews Logo" class="logo">
            <h1>Capibrews Admin Panel</h1>
            <button id="logout-btn">Logout</button>
        </header>

        <main id="admin-container">
            <section class="admin-actions">
                <button id="show-add-modal" class="add-btn">+ Add New Menu Item</button>
            </section>
            <p class="loading">Loading menu items...</p>
        </main>
    </div>

    <!-- Add Item Modal -->
    <div id="add-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Add New Menu Item</h2>
            <form id="add-item-form">
                <input type="text" id="new-name" placeholder="Item Name (e.g. Mango Graham)" required>
                <input type="text" id="new-category" placeholder="Category (e.g. MILKSHAKES)" required>
                
                <div class="price-type-selector">
                    <label><input type="radio" name="price-type" value="single" checked> Single Price</label>
                    <label><input type="radio" name="price-type" value="multi"> Multiple Sizes (16OZ/22OZ)</label>
                </div>

                <div id="single-price-input">
                    <input type="number" id="new-price" placeholder="Price (₱)" step="0.01">
                </div>

                <div id="multi-price-input" class="hidden">
                    <input type="number" id="new-price-16" placeholder="16OZ Price (₱)" step="0.01">
                    <input type="number" id="new-price-22" placeholder="22OZ Price (₱)" step="0.01">
                </div>

                <div class="modal-btns">
                    <button type="button" id="close-modal" class="cancel-btn">Cancel</button>
                    <button type="submit" class="save-btn">Add to Menu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
