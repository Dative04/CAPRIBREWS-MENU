<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capibrews Admin | Control Panel</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar Navigation -->
        <div id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
                <img src="https://i.imgur.com/F022t03.png" alt="Capibrews Logo" class="logo">
            </div>
            <nav class="nav-links">
                <a href="#" class="nav-item active" onclick="showSection('inventory')">
                    <span class="icon">📋</span> Inventory
                </a>
                <a href="#" class="nav-item" onclick="showSection('orders')">
                    <span class="icon">☕</span> Orders
                </a>
                <a href="#" class="nav-item" onclick="showSection('settings')">
                    <span class="icon">⚙️</span> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </div>

        <!-- Main Content Area -->
        <main id="main-content" class="admin-main">
            <header class="admin-top-bar">
                <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
                <h1 id="view-title">Control Panel</h1>
                <div class="top-bar-right">
                    <button id="show-add-modal" class="add-btn">+ New Item</button>
                </div>
            </header>

            <div id="admin-container">
                <div id="login-screen">
                    <div class="login-box">
                        <img src="https://i.imgur.com/F022t03.png" alt="Capibrews Logo" class="login-logo">
                        <h1>Admin Login</h1>
                        <form id="login-form">
                            <input type="email" id="email" placeholder="Email" required>
                            <input type="password" id="password" placeholder="Password" required>
                            <button type="submit">Login</button>
                        </form>
                        <p id="login-error" class="error"></p>
                    </div>
                </div>

                <div id="admin-screen" class="hidden">
                    <!-- Inventory Section -->
                    <section id="inventory-section">
                        <div class="view-header">
                            <h2>Manage Menu</h2>
                            <div class="header-controls">
                                <select id="itemCategory">
                                    <option value="Soda Blends">Soda Blends</option>
                                    <option value="Signature Blends">Signature Blends</option>
                                    <option value="Coffee Selection">Coffee Selection</option>
                                </select>
                                <div class="search-filter">
                                    <input type="text" id="admin-search" placeholder="Search items...">
                                </div>
                            </div>
                        </div>
                        <div id="admin-grid" class="admin-item-grid">
                            <p class="loading">Fetching your inventory...</p>
                        </div>
                    </section>

                    <!-- Orders Section -->
                    <section id="orders-section" style="display:none;">
                        <div class="view-header">
                            <h2>Incoming Orders</h2>
                            <button id="refresh-orders-btn" class="btn-secondary" style="font-size: 0.85em;">↻ Refresh Feed</button>
                        </div>
                        <div class="orders-table-wrapper">
                            <table id="ordersTable" class="admin-table">
                                <thead>
                                    <tr>
                                        <th>Customer</th>
                                        <th>Items ordered</th>
                                        <th>Total</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="ordersTableBody"></tbody>
                            </table>
                        </div>
                    </section>

                    <!-- Settings Section -->
                    <section id="settings-section" style="display:none;">
                        <div class="view-header">
                            <h2>Settings</h2>
                        </div>
                        <div class="settings-content">
                            <button onclick="seedMenuData()" class="btn-secondary">
                                <span class="icon">🌱</span> Sync Default Menu Data
                            </button>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <!-- Enhanced Add Item Modal -->
    <div id="add-modal" class="modal hidden">
        <div class="modal-content">
            <h2>New Menu Item</h2>
            <form id="add-item-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="new-name" placeholder="e.g. Cold Brew" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="new-category" placeholder="e.g. COLD COFFEE" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="new-description" placeholder="Describe the flavors..." rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="new-image" placeholder="Paste image link here">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Pricing Type</label>
                        <select id="price-type-select">
                            <option value="single">Single Price</option>
                            <option value="multi">Multiple Sizes</option>
                        </select>
                    </div>
                    <div class="form-group dietary-checks">
                        <label>Dietary</label>
                        <div class="check-group">
                            <label><input type="checkbox" value="vegan" class="diet-check"> Vegan</label>
                            <label><input type="checkbox" value="gf" class="diet-check"> GF</label>
                        </div>
                    </div>
                </div>

                <div id="single-price-input" class="price-section">
                    <label>Base Price (₱)</label>
                    <input type="number" id="new-price" placeholder="0.00" step="0.01">
                </div>

                <div id="multi-price-input" class="price-section hidden">
                    <div id="price-rows">
                        <!-- Dynamic price rows will be added here -->
                    </div>
                    <button type="button" id="add-price-row" class="btn-secondary" style="width: auto; margin-top: 10px; padding: 5px 15px;">+ Add Size/Price</button>
                </div>

                <div class="modal-btns">
                    <button type="button" id="close-modal" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Create Item</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="menu-data.js"></script>
    <script src="admin.js"></script>
</body>
</html>
