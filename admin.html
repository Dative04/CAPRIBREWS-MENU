<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capibrews Admin</title>
    <link rel="stylesheet" href="admin.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <img src="https://i.imgur.com/F022t03.png" alt="Capibrews Logo" class="login-logo">
            <h1>Admin Login</h1>
            <form id="login-form">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p id="login-error" class="error"></p>
        </div>
    </div>

    <div id="admin-screen" class="hidden">
        <header class="admin-header">
            <img src="https://i.imgur.com/F022t03.png" alt="Capibrews Logo" class="logo">
            <h1>Capibrews Admin Panel</h1>
            <button id="logout-btn">Logout</button>
        </header>

        <main id="admin-container">
            <p class="loading">Loading menu items...</p>
        </main>
    </div>

    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
