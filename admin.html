<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capibrews Admin | Control Panel</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- Collapsible Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="sidebar-header">
                <img src="https://i.imgur.com/F022t03.png" alt="Capibrews Logo" class="logo">
                <button id="close-sidebar" class="mobile-only">×</button>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="inventory">Edit Menu</button>
                <button class="nav-item" id="price-manager-btn">Price Manager</button>
                <button class="nav-item" onclick="seedMenuData()">Seed Data</button>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-top-bar">
                <button id="open-sidebar" class="mobile-only">☰</button>
                <h1>Control Panel</h1>
                <div class="top-bar-right">
                    <button id="show-add-modal" class="add-btn">+ New Item</button>
                </div>
            </header>

            <div id="admin-container">
                <div id="login-screen">
                    <div class="login-box">
                        <img src="https://i.imgur.com/F022t03.png" alt="Capibrews Logo" class="login-logo">
                        <h1>Admin Login</h1>
                        <form id="login-form">
                            <input type="email" id="email" placeholder="Email" required>
                            <input type="password" id="password" placeholder="Password" required>
                            <button type="submit">Login</button>
                        </form>
                        <p id="login-error" class="error"></p>
                    </div>
                </div>

                <div id="admin-screen" class="hidden">
                    <div class="stats-row">
                        <div class="stat-pill">Items: <span id="stat-count">0</span></div>
                        <div class="stat-pill">Categories: <span id="stat-cats">0</span></div>
                    </div>
                    
                    <div id="admin-grid" class="admin-item-grid">
                        <p class="loading">Fetching your inventory...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Enhanced Add Item Modal -->
    <div id="add-modal" class="modal hidden">
        <div class="modal-content">
            <h2>New Menu Item</h2>
            <form id="add-item-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="new-name" placeholder="e.g. Cold Brew" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <input type="text" id="new-category" placeholder="e.g. COLD COFFEE" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="new-description" placeholder="Describe the flavors..." rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="new-image" placeholder="Paste image link here">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Pricing Type</label>
                        <select id="price-type-select">
                            <option value="single">Single Price</option>
                            <option value="multi">Multiple Sizes</option>
                        </select>
                    </div>
                    <div class="form-group dietary-checks">
                        <label>Dietary</label>
                        <div class="check-group">
                            <label><input type="checkbox" value="vegan" class="diet-check"> Vegan</label>
                            <label><input type="checkbox" value="gf" class="diet-check"> GF</label>
                        </div>
                    </div>
                </div>

                <div id="single-price-input" class="price-section">
                    <label>Base Price (₱)</label>
                    <input type="number" id="new-price" placeholder="0.00" step="0.01">
                </div>

                <div id="multi-price-input" class="price-section hidden">
                    <div id="price-rows">
                        <!-- Dynamic price rows will be added here -->
                    </div>
                    <button type="button" id="add-price-row" class="btn-secondary" style="width: auto; margin-top: 10px; padding: 5px 15px;">+ Add Size/Price</button>
                </div>

                <div class="modal-btns">
                    <button type="button" id="close-modal" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Create Item</button>
                </div>
            </form>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="menu-data.js"></script>
    <script src="admin.js"></script>
</body>
</html>
